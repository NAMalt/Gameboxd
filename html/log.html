<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gameboxd - Log a Game</title>
    <link href="/css/styles.css" rel="stylesheet" />
</head>
<body>

    <nav>
        <span class="nav-logo">Gameboxd</span>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="log.html" class="active">Log</a></li>
            <li><a href="login.html" id="loginNavLink">Login</a></li>
        </ul>
    </nav>

    <div class="wrapper">

        <!-- Game Info + Review -->
        <div class="game-detail-layout">

            <!-- Left: Cover + Meta -->
            <div>
                <div class="game-cover-lg">
                    <img id="gameCover" alt="Game Cover">
                </div>

                <div class="game-meta">
                    <p id="releaseDate"></p>
                    <p id="devs"></p>
                    <p id="genre"></p>
                </div>
            </div>

            <!-- Right: Review Form -->
            <div>
                <h1 id="gameTitle"></h1>

                <div class="like-section">
                    <button class="like-btn">♥</button>
                    <span class="like-count" id="likeCount"></span>
                </div>

                <div class="review-section">
                    <h3>Write Your Review</h3>
                    <textarea id="reviewText" placeholder="What did you think?"></textarea>

                    <div class="star-row" id="starRating">
                        <span data-value="1">★</span>
                        <span data-value="2">★</span>
                        <span data-value="3">★</span>
                        <span data-value="4">★</span>
                        <span data-value="5">★</span>
                    </div>

                    <button class="submit-btn">Submit Review</button>
                </div>
            </div>
        </div>

        <!-- Friend Reviews -->
        <div class="section-header">
            <h2>Friend Reviews</h2>
            <a href="#">See all →</a>
        </div>

        <div class="review-row" id="friendReviews">
        </div>

        <!-- Other User Reviews -->
        <div class="section-header">
            <h2>Other User Reviews</h2>
            <a href="#">See all →</a>
        </div>

        <div class="review-row" id="userReviews">

        </div>

    </div>

    <footer>
        <p>Gameboxd &mdash; Track what you play.</p>
    </footer>

    <script type="module">
        import { AuthManager } from "/js/auth.js";
        const auth = new AuthManager();
        auth.setupNavigationState();
    </script>

    <script type="module" src="/js/logpage.js"></script>

</body>
</html>

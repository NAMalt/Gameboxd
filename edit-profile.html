<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gameboxd - Edit Profile</title>
    <link href="styles.css" rel="stylesheet" />
    
</head>
<body>
    <nav>
        <span class="nav-logo">Gameboxd</span>
    </nav>

    <div class="wrapper">
        <div class="section-header">
            <h2>Choose Your Avatar</h2>
        </div>
        
        <div class="avatar-options">
            <img src="images/CallofDuty.jpg" alt="Avatar 1" class="avatar-option" data-img="images/CallofDuty.jpg">
            <img src="images/fortnite.png" alt="Avatar 2" class="avatar-option" data-img="images/fortnite.png">
            <img src="images/MinecraftSteve.png" alt="Avatar 3" class="avatar-option" data-img="images/MinecraftSteve.png">
            <img src="images/rocketLeague.jpg" alt="Avatar 4" class="avatar-option" data-img="images/rocketLeague.jpg">
            <img src="images/xbox.png" alt="Avatar 5" class="avatar-option" data-img="images/xbox.png">
        </div>
    </div>

    <script type="module">
        import { ProfileEditor } from "./edit-profile.js";
        import { AuthManager } from "./auth.js";

        const auth = new AuthManager();
        auth.setupNavigationState();

        const editor = new ProfileEditor();
        editor.init();
    </script>
</body>
</html>
